##Google API console
##http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:no-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:no-client-secret}

# Deploy Project to AWS EBS
server.port=5000

server.servlet.session.cookie.same-site=strict

jwt.secret=${JWT_SECRET:my-local-dev-jwt-secret-key-that-is-at-least-32-characters-long}


## Configure Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@localhost}
spring.mail.password=${MAIL_PASSWORD:no-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


## Configure Twilio for SMSes
twilio.account.sid=${TWILIO_ACCOUNT_SID:no-sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:no-token}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+0000000000}

# show component-level health info in responses (dev only)
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,mappings
management.health.mail.enabled=false
# expose liveness & readiness at /actuator/health/liveness and /actuator/health/readiness
management.endpoint.health.probes.enabled=true

### Contact Us Notification ###
contact.notification.email=${CONTACT_NOTIFICATION_EMAIL:tshepomokgoatjane11@gmail.com}

### Gallery Image Upload ###
gallery.upload.dir=${GALLERY_UPLOAD_DIR:uploads/gallery}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

### reCAPTCHA Server Site Secret ###
recaptcha.secret=${RECAPTCHA_SECRET:no-recaptcha-secret}