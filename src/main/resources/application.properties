spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

## Make use of environmental variables
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME:localhost}:${RDS_PORT:3307}/${RDS_DB_NAME:tenants}
spring.datasource.username=${RDS_USERNAME:tenants-user}
spring.datasource.password=${RDS_PASSWORD:dummytenants}


##Google API console
##http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Deploy Project to AWS EBS
server.port=5000

server.servlet.session.cookie.same-site=strict

jwt.secret=${JWT_SECRET}


## Configure Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


## Configure Twilio for SMSes
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# show component-level health info in responses (dev only)
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,mappings
management.health.mail.enabled=false
# expose liveness & readiness at /actuator/health/liveness and /actuator/health/readiness
management.endpoint.health.probes.enabled=true

### reCAPTCHA Server Site Secret ###
recaptcha.secret=${RECAPTCHA_SECRET}