## Test configuration - overrides main application.properties for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=never

## Test values for secrets (not real credentials)
jwt.secret=test-secret-key-for-unit-tests-only-1234567890-must-be-at-least-256-bits-long

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

twilio.account.sid=ACtest000000000000000000000000000
twilio.auth.token=test000000000000000000000000000000
twilio.phone.number=+10000000000

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

recaptcha.secret=test-recaptcha-secret

contact.notification.email=tshepomokgoatjane11@gmail.com

management.health.mail.enabled=false
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.probes.enabled=true

server.port=0
